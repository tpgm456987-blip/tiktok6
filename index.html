  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {

/* ── HERO ── */
.hero { padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden; background: linear-gradient(170deg, #fdfbf7 0%, var(--cream) 100%); }
.hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, var(--gold-glow), transparent 70%); border-radius: 50%; }
.hero::after { content: ''; position: absolute; bottom: -40px; left: -40px; width: 150px; height: 150px; background: radial-gradient(circle, var(--rose-soft), transparent 70%); border-radius: 50%; }
.ribbon { display: inline-flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--cream); font-size: 12px; font-weight: 700; color: var(--gold); padding: 7px 18px; border-radius: 100px; margin-bottom: 20px; box-shadow: var(--shadow); animation: fadeDown 0.7s ease-out; letter-spacing: 0.04em; }
.ribbon .dot { width: 6px; height: 6px; background: var(--rose); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
.hero-gift-icon { width: 80px; height: 80px; margin: 0 auto 18px; background: linear-gradient(145deg, #f7ead0, #f0dbb8); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 6px 24px rgba(184,134,11,0.15); animation: fadeDown 0.7s 0.1s ease-out both; position: relative; }
.hero-gift-icon::after { content: '✨'; position: absolute; top: -8px; right: -8px; font-size: 20px; animation: sparkle 2s ease-in-out infinite; }
.hero h1 { font-size: 24px; font-weight: 900; color: var(--brown); line-height: 1.55; margin-bottom: 12px; animation: fadeDown 0.7s 0.2s ease-out both; }
.hero h1 .highlight { background: linear-gradient(transparent 60%, rgba(184,134,11,0.18) 60%); padding: 0 2px; }
.hero h1 .gold { color: var(--gold); }
.hero-sub { font-size: 14px; color: var(--brown-light); line-height: 1.7; animation: fadeDown 0.7s 0.3s ease-out both; }

/* ── DIVIDER ── */
.divider { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 40px; margin: 4px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--cream), transparent); }
.divider span { font-size: 16px; opacity: 0.5; }

/* ── SECTIONS ── */
.section-eyebrow { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: 0.12em; margin-bottom: 4px; }
.section-title { text-align: center; font-size: 20px; font-weight: 900; color: var(--brown); margin-bottom: 24px; line-height: 1.5; }
